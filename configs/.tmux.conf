
# Basic Settings
set -g default-terminal "screen-256color"  # Enable 256 colors
set -g mouse on                            # Enable mouse support

# Start window numbering from 1
set -g base-index 1
setw -g pane-base-index 1                  # Start pane numbering from 1

# Unbind default prefix
unbind C-b

# Use Ctrl-a as prefix (like GNU screen)
set -g prefix C-a

# Pass prefix through to inner sessions (e.g. nested tmux)
bind C-a send-prefix

# Custom bindings, Option+1-6 remapped to F1-F6 in Ghostty
bind-key -n F1 select-window -t 1
bind-key -n F2 select-window -t 2
bind-key -n F3 select-window -t 3
bind-key -n F4 select-window -t 4
bind-key -n F5 select-window -t 5
bind-key -n F6 select-window -t 6
# bind-key -n F7 select-window -t 7  # disabled: F7-F9 not remapped in terminal
# bind-key -n F8 select-window -t 8
# bind-key -n F9 select-window -t 9

# Pane navigation (vim-style hjkl + cycle with ^n)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind ^n select-pane -t :.+

# Alt+number window selectors (disabled: redundant with F1-F6)
# bind-key -n M-1 select-window -t 1
# bind-key -n M-2 select-window -t 2
# bind-key -n M-3 select-window -t 3
# bind-key -n M-4 select-window -t 4
# bind-key -n M-5 select-window -t 5
# bind-key -n M-6 select-window -t 6

# Enable Vim-style copy mode navigation
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe 'pbcopy'
bind s copy-mode  # enter copy mode without a selection
set -g history-limit 100000

# Status Bar
set -g status-bg black                     # Background color for status bar
set -g status-fg white                     # Foreground color for status bar
set -g status-left '[#S]'                 # Show session name on the left
set -g status-right '%H:%M %d-%b-%Y'       # Show time and date on the right
set -g status-position bottom

# tmux-sessionizer
bind-key -r f run-shell "tmux neww tmux-sessionizer"
