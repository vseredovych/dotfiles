################
### MONITORS ###
################

monitor = eDP-1,    1920x1080@144, 0x0,    1
monitor = HDMI-A-1, 1920x1080@120, 1920x0, 1

# Alternatives:
#monitor = ,preferred,auto,auto
#monitor = eDP-1,2560x1440@144,0x0,1
#monitor = HDMI-A-1,1920x1080@100,2560x0,1
#monitor = HDMI-A-1,2560x1440@120,2560x0,1


###################
### MY PROGRAMS ###
###################

$terminal    = ghostty
$fileManager = dolphin
$menu        = ~/.config/rofi/launchers/type-4/launcher.sh


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hyprpaper
exec-once = hyprlock

exec-once = [workspace 1 silent] ghostty
exec-once = [workspace 2 silent] flatpak run app.zen_browser.zen
# exec-once = [workspace 2 silent] firefox
exec-once = [workspace 3 silent] obsidian
exec-once = [workspace 5 silent] teams-for-linux
exec-once = [workspace 9 silent] /opt/cisco/anyconnect/bin/vpnui
exec-once = sleep 2 && hyprctl dispatch workspace 1


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XCURSOR_SIZE,    24
env = HYPRCURSOR_SIZE, 24


#####################
### LOOK AND FEEL ###
#####################

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in  = 5
    gaps_out = 6

    border_size = 2

    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing    = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled        = true
        size           = 8
        passes         = 3
        ignore_opacity = true
        noise          = 0.01
        vibrancy       = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = no, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1.0
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 2.0, default
    animation = border,        1, 2.0, easeOutQuint
    animation = windows,       1, 2.0, easeOutQuint
    animation = windowsIn,     1, 2.0, easeOutQuint,  popin 87%
    animation = windowsOut,    1, 2.0, linear,         popin 87%
    animation = fadeIn,        1, 2.0, almostLinear
    animation = fadeOut,       1, 2.0, almostLinear
    animation = fade,          1, 2.0, quick
    animation = layers,        1, 2.0, easeOutQuint
    animation = layersIn,      1, 2.0, easeOutQuint,  fade
    animation = layersOut,     1, 2.0, linear,         fade
    animation = fadeLayersIn,  1, 2.0, almostLinear
    animation = fadeLayersOut, 1, 2.0, almostLinear
    animation = workspaces,    1, 2.0, almostLinear,  fade
    animation = workspacesIn,  1, 2.0, almostLinear,  fade
    animation = workspacesOut, 1, 2.0, almostLinear,  fade
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    pseudotile     = true
    preserve_split = true
}

# https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1
    focus_on_activate       = true
    disable_hyprland_logo   = false
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout  = us,ru,ua
    kb_options = grp:ctrl_space_toggle,caps:none
    repeat_delay = 200
    repeat_rate  = 30
    touchpad {
        natural_scroll = true
    }
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# System / utilities
bind = $mainMod,       P,     exec, hyprctl switchxkblayout current next
bind = $mainMod,       S,     exec, hyprshot -m region --clipboard-only
bind = $mainMod SHIFT, S,     exec, hyprshot -m window --clipboard-only
bind = $mainMod,       K,     exec, wshowkeys -a right -m 50 -l 42 -t 1069  # NOTE: conflicts with movefocus K below
bind = $mainMod SHIFT, K,     exec, pkill -9 wshowkeys
bind = $mainMod,       W,     exec, pkill waybar && waybar &

# Application launchers
bind = $mainMod, C, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu

# Window management
bind = $mainMod,       Q,     killactive
bind = $mainMod,       V,     togglefloating
bind = $mainMod,       F,     fullscreen
bind = $mainMod SHIFT, J,     togglesplit
bind = $mainMod,       M,     movecurrentworkspacetomonitor, +1
bind = $mainMod SHIFT, M,     exit

# Move focus (vi-style; note: K conflicts with wshowkeys bind above)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# Lock screen
bind = $mainMod SHIFT, L, exec, hyprlock


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Smart gaps: remove borders/gaps when only one tiled window is on the workspace.
# w[tv1] = workspace with 1 tiled visible window
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/#smart-gaps
workspace = w[tv1], gapsout:0, gapsin:0
#workspace = f[1], gapsout:0, gapsin:0

windowrulev = bordersize 0, floating:0, onworkspace:w[tv1]
windowrulev = rounding 0,   floating:0, onworkspace:w[tv1]
windowrulev = bordersize 0, floating:0, onworkspace:f[1]
windowrulev = rounding 0,   floating:0, onworkspace:f[1]

# Monitor assignments (workspace 8 = laptop screen, all others = HDMI)
workspace = 1,  monitor:HDMI-A-1
workspace = 2,  monitor:HDMI-A-1
workspace = 3,  monitor:HDMI-A-1
workspace = 4,  monitor:HDMI-A-1
workspace = 5,  monitor:HDMI-A-1
workspace = 6,  monitor:HDMI-A-1
workspace = 7,  monitor:HDMI-A-1
workspace = 8,  monitor:eDP-1
workspace = 9,  monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
